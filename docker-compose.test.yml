services:
  notification:
    build: .
    ports:
      - "8005:8005"
    environment:
      RESEND_API_KEY: test_key
      NOTIFICATION_FROM: noreply@example.com
      NOTIFICATION_TO: inbox@example.com
      CORS_ORIGINS: http://localhost:3000
      TRUSTED_PROXY_HOPS: 0
      ENV: test
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request, sys; resp=urllib.request.urlopen('http://127.0.0.1:8005/health', timeout=5); sys.exit(0 if resp.status == 200 else 1)"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
